kind = "web"
previewPath = "/"
title = "Smart Curriculum Activity & Attendance App"
version = "1.0.0"
id = "artifacts/smart-campus"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21691

[services.development]
run = "pnpm --filter @workspace/smart-campus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-campus", "run", "build" ]
serve = "static"
publicDir = "artifacts/smart-campus/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21691"
BASE_PATH = "/"
